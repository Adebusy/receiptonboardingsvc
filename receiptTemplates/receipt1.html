<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href='https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap' rel='stylesheet'>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; color: #333; }
        .receipt-box { max-width: 700px; margin: auto; border: 1px solid #ddd; padding: 30px; background: white; }
        .header { text-align: center; border-bottom: 2px solid #002D62; padding-bottom: 10px; }
        .meta-info { display: flex; justify-content: space-between; margin: 20px 0; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #002D62; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        tr:nth-child(even) { background: #f9f9f9; }
        
        .total-section { text-align: right; margin-top: 30px; }
        .handwriting { font-family: 'Dancing Script', cursive; font-size: 22px; color: #002D62; margin-top: 5px; }

        /* FIXED SIGNATURE AREA */
        .signature-outer-wrapper {
            display: flex;
            justify-content: flex-end; /* Pushes the sig to the right */
            margin-top: 60px; /* Gives space so it doesn't struggle to fit */
        }
        .signature-container {
            text-align: center;
            width: 200px;
        }
        .manager-sig-image {
            display: block;
            margin: 0 auto -20px auto; /* Overlaps the line slightly for a natural look */
            max-width: 140px;
            height: 60px; /* Fixed height helps keep it stable */
            object-fit: contain;
        }
        .sig-line {
            border-top: 1px solid #333;
            padding-top: 8px;
        }
    </style>
</head>
<body>
    <div class="receipt-box">
        <div class="header">
            <img src="{{LOGO_URL}}" alt="Logo" style="width:100px;">
            <h1 style="margin:5px 0;">{{COMPANY_NAME}}</h1>
            <p>25, Repton Drive, Coventry | Manager: Alao Ramon</p>
        </div>

        <div class="meta-info">
            <div>
                <strong>CUSTOMER:</strong><br>
                Splendor Concept
            </div>
            <div style="text-align: right;">
                <strong>DATE:</strong> February 4, 2026<br>
                <strong>INVOICE:</strong> #ADE-2026-001
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Qty</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>MacBook Pro</td><td>1</td><td>£1,000.00</td></tr>
                <tr><td>Mouse</td><td>1</td><td>£200.00</td></tr>
            </tbody>
        </table>

        <div class="total-section">
            <h2 style="color:#002D62; margin-bottom: 5px;">TOTAL: £1,200.00</h2>
            <div style="text-align:left; margin-top: 20px;">
                <strong>Amount in Words:</strong><br>
                <span class="handwriting">One Thousand Two Hundred Pounds Only.</span>
            </div>
        </div>

        <div class="signature-outer-wrapper">
            <div class="signature-container">
                <img src="https://your-storage.com/signatures/alao-ramon-sig.png" class="manager-sig-image" alt="Signature">
                <div class="sig-line">
                    <strong>Alao Ramon</strong><br>
                    <span style="font-size: 12px; color: #666;">{{SIGNATURE}}</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
